<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mesón Restaurante El Rastrillo</title>
  <meta name="description" content="Carta digital de Mesón Restaurante El Rastrillo">
  <link rel="stylesheet" href="estilos.css?v=20260715-29">
</head>
<body>
<header class="hero">
  
    


<div class="hero-art">
  <picture>
    <source media="(orientation: portrait)" srcset="portada-movil-v2.png">
    <img class="hero-photo" src="portada-horizontal-v4.png" alt="Portada de Mesón El Rastrillo">
  </picture>
  <a class="hero-button" href="#carta" aria-label="Ver la carta"></a>
</div>

</header>

<main id="carta">
  <section class="intro">
    <h2>Nuestra carta</h2>
    <p>Selecciona una categoría para ver los platos.</p>
  </section>

  <nav class="categories" aria-label="Categorías">
    <button data-filter="all" class="active">Toda la carta</button>
    <button data-filter="raciones">Raciones</button>
    <button data-filter="sopas">Sopas</button>
    <button data-filter="pescados">Pescados y mariscos</button>
    <button data-filter="combinados">Platos combinados</button>
    <button data-filter="carnes">Carnes premium</button>
    <button data-filter="arroces">Arroces</button>
    <button data-filter="pastas">Pastas</button>
    <button data-filter="postres">Postres</button>
  </nav>

  <section id="platos" class="grid" aria-live="polite"></section>
</main>

<div id="modal" class="modal" aria-hidden="true">
  <button class="modal-close" aria-label="Cerrar">×</button>
  <div class="modal-photo-wrap">
    <img id="modal-img" alt="">
    <span id="modal-number-fix" class="image-badge-fix" hidden></span>
    <span id="modal-price" class="image-price" hidden></span>
  </div>
  <p id="modal-title"></p>
</div>

<footer>
  <p>Mesón Restaurante El Rastrillo · Desde 1982</p>
  <div class="creator-credit">
    <span>Creada por Kromática Publicidad</span>
  </div>
</footer>

<script src="script.js?v=20260715-29"></script>
</body>
</html>
